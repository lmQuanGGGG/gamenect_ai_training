name: Daily Model Training & Deploy

on:
  schedule:
    - cron: '0 2 * * *'  # Chạy mỗi ngày lúc 2h sáng UTC (9h VN)
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/train_real_data.py'
      - 'scripts/collect_from_firebase.py'
      - 'pipelines/**'
      - 'collectors/**'

jobs:
  train_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn scipy matplotlib seaborn protobuf firebase-admin requests python-dotenv pyyaml fastapi uvicorn pydantic rich joblib geopy shap

    - name: Setup Credentials & Envs
      run: |
        echo '${{ secrets.FIREBASE_KEY }}' > firebase-key.json
        echo "FIREBASE_CREDENTIALS_PATH=./firebase-key.json" >> .env
        echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
        echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
        echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

    - name: Collect data from Firebase
      run: |
        python scripts/collect_from_firebase.py

    - name: Train model
      run: |
        python scripts/train_real_data.py

    - name: Test model
      run: |
        python scripts/test_pairwise_model.py

    - name: Upload trained models
      uses: actions/upload-artifact@v4
      with:
        name: trained-models
        path: |
          models/*.pkl
        retention-days: 30

    - name: Upload logs
      uses: actions/upload-artifact@v4
      with:
        name: training-logs
        path: |
          models/training_history.log
        retention-days: 7

    - name: Reload model on Railway API
      run: |
        curl -X POST "${{ secrets.API_RELOAD_URL }}" \
          -H "Authorization: Bearer ${{ secrets.MODEL_DOWNLOAD_TOKEN }}" \
          -F "model=@models/pairwise_compatibility_model.pkl" \
          -F "scaler=@models/pairwise_scaler.pkl"